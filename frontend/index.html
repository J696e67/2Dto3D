<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>sketch2stl — Draw &amp; Convert to 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1A1410;
    --container: #2A2118;
    --border: #3D3228;
    --accent: #D4A574;
    --accent-dark: #B88A5E;
    --text-pri: #F5F1ED;
    --text-sec: #CAB8A8;
    --text-mut: #8B7D73;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --nav-h: 44px;
    --tab-h: 50px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text-pri);
    height: 100vh; height: 100dvh;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── App Shell ─────────────────────────────────────── */
  .app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
  }

  /* ── Nav Bar ───────────────────────────────────────── */
  .nav-bar {
    background: var(--container);
    border-bottom: 1px solid var(--border);
    padding-top: var(--safe-top);
    flex-shrink: 0;
  }
  .nav-bar-inner {
    height: var(--nav-h);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .nav-title {
    font-size: 17px; font-weight: 700; color: var(--text-pri);
  }

  /* ── Tab Panels ────────────────────────────────────── */
  .tab-content {
    flex: 1; min-height: 0;
    position: relative;
  }
  .tab-panel {
    position: absolute; inset: 0;
    display: none; flex-direction: column;
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .tab-panel.active { display: flex; }

  /* ── Tab Bar ───────────────────────────────────────── */
  .tab-bar {
    background: var(--container);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    flex-shrink: 0;
  }
  .tab-bar-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px; padding: 6px 0 4px;
    background: none; border: none; cursor: pointer;
    color: var(--text-mut);
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-bar-btn.active { color: var(--accent); }
  .tab-bar-btn svg { width: 24px; height: 24px; fill: currentColor; }
  .tab-bar-btn span { font-size: 10px; font-weight: 500; }

  /* ── DRAW TAB ──────────────────────────────────────── */
  #drawPanel { padding: 12px 16px 16px; gap: 12px; }

  /* Segmented Control */
  .segmented {
    display: flex; background: var(--bg); border-radius: 8px;
    padding: 2px; gap: 2px;
  }
  .segmented button {
    flex: 1; padding: 8px 0; border: none; border-radius: 7px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    background: transparent; color: var(--text-sec);
    transition: all 0.2s;
  }
  .segmented button.active {
    background: var(--accent); color: #fff;
  }

  /* Color Palette */
  .palette-row {
    display: flex; justify-content: center; gap: 16px;
  }
  .palette-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .palette-circle {
    width: 40px; height: 40px; border-radius: 50%;
    border: 2.5px solid transparent;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .palette-item.active .palette-circle {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent);
  }
  .palette-label { font-size: 11px; color: var(--text-sec); }

  /* Brush Size */
  .brush-size-row {
    display: flex; align-items: center; gap: 10px;
    padding: 0 4px;
  }
  .brush-size-row label { font-size: 13px; color: var(--text-sec); white-space: nowrap; }
  .brush-size-row input[type="range"] { flex: 1; accent-color: var(--accent); height: 44px; }
  .brush-size-row .size-val {
    font-size: 14px; font-weight: 600; color: var(--accent);
    min-width: 20px; text-align: right;
  }

  /* Canvas */
  .canvas-wrap {
    flex: 1; min-height: 0; display: flex;
    align-items: center; justify-content: center;
  }
  canvas#drawCanvas {
    background: #fff; border-radius: 10px;
    cursor: crosshair; display: block;
    touch-action: none;
    max-width: 100%; max-height: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  /* Action Buttons */
  .action-row {
    display: flex; gap: 10px;
  }
  .action-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px 0; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background 0.15s;
    min-height: 48px;
  }
  .action-btn.outline {
    background: var(--container); color: var(--text-pri);
    border: 1px solid var(--border);
  }
  .action-btn.outline:active { background: var(--border); }
  .action-btn.primary {
    background: var(--accent); color: #fff; border: none;
  }
  .action-btn.primary:active { background: var(--accent-dark); }
  .action-btn svg { width: 18px; height: 18px; fill: currentColor; }
  input[type="file"] { display: none; }

  /* ── SETTINGS TAB ──────────────────────────────────── */
  #settingsPanel { padding: 0 0 0; }

  .settings-scroll {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 16px 16px 100px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .section-header {
    font-size: 13px; font-weight: 700; color: var(--text-sec);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 0 4px; margin-bottom: -8px;
  }

  .card {
    background: var(--container); border-radius: 12px;
    border: 1px solid var(--border); overflow: hidden;
  }
  .card-row {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; min-height: 52px;
  }
  .card-row + .card-row { border-top: 1px solid var(--border); }

  .card-row .color-dot {
    width: 16px; height: 16px; border-radius: 50%;
    flex-shrink: 0;
  }
  .card-row .row-label {
    font-size: 15px; color: var(--text-pri);
    min-width: 60px; flex-shrink: 0;
  }
  .card-row input[type="range"] {
    flex: 1; accent-color: var(--accent); min-width: 0;
    height: 44px;
  }
  .card-row .row-val {
    font-size: 14px; font-weight: 600; color: var(--accent);
    min-width: 48px; text-align: right; flex-shrink: 0;
  }

  /* Toggle Switch */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; min-height: 52px;
  }
  .toggle-row .row-label { font-size: 15px; color: var(--text-pri); }
  .toggle-switch {
    position: relative; width: 51px; height: 31px; flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0; cursor: pointer;
    background: #3a3a3c; border-radius: 31px;
    transition: background 0.2s;
  }
  .toggle-slider::before {
    content: ''; position: absolute;
    width: 27px; height: 27px; left: 2px; bottom: 2px;
    background: #fff; border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider { background: #34c759; }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }

  /* Sticky Convert Button */
  .sticky-convert {
    position: sticky; bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    padding-bottom: calc(12px);
    background: linear-gradient(to top, var(--bg) 70%, transparent);
  }
  #convertBtn {
    width: 100%; padding: 16px; border: none; border-radius: 12px;
    background: var(--accent); color: #fff;
    font-size: 17px; font-weight: 700; cursor: pointer;
    transition: background 0.15s;
    min-height: 52px;
  }
  #convertBtn:active { background: var(--accent-dark); }
  #convertBtn:disabled { background: #444; cursor: wait; opacity: 0.7; }
  #statusMsg {
    font-size: 13px; color: var(--text-sec); text-align: center;
    margin-top: 6px; min-height: 1.2em;
  }
  #statusMsg.error { color: var(--accent); }
  #statusMsg.warning {
    color: #f0a500; background: rgba(240,165,0,0.1);
    border: 1px solid rgba(240,165,0,0.3); border-radius: 8px;
    padding: 8px; line-height: 1.4;
  }

  /* ── PREVIEW TAB ───────────────────────────────────── */
  #previewPanel { padding: 0; }

  .preview-viewer {
    flex: 1; min-height: 0; position: relative;
  }
  #preview3d {
    width: 100%; height: 100%; background: var(--bg);
  }
  .preview-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 12px; color: var(--text-mut);
  }
  .preview-empty svg { width: 64px; height: 64px; fill: var(--text-mut); opacity: 0.4; }
  .preview-empty p { font-size: 15px; text-align: center; line-height: 1.5; }

  .preview-status-chip {
    position: absolute; top: 12px; right: 12px;
    background: rgba(52,199,89,0.2); color: #34c759;
    font-size: 12px; font-weight: 600; padding: 4px 12px;
    border-radius: 20px; display: none;
  }
  .preview-status-chip.visible { display: block; }

  .preview-actions {
    display: flex; gap: 10px; padding: 12px 16px;
    background: var(--container);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .preview-actions .action-btn { flex: 1; }

  /* ── Desktop: keep it centered ─────────────────────── */
  @media (min-width: 500px) {
    .app { max-width: 430px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  }
</style>
</head>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { convertCanvasToSTL, NotEnclosedError } from './js/converter.js';

// ========== Tab Navigation ==========
const tabBtns = document.querySelectorAll('.tab-bar-btn');
const tabPanels = document.querySelectorAll('.tab-panel');
const navTitle = document.getElementById('navTitle');

const tabTitles = {
  drawPanel: 'sketch2stl',
  settingsPanel: 'Convert',
  previewPanel: '3D Preview',
};

function switchTab(tabId) {
  tabPanels.forEach(p => p.classList.remove('active'));
  tabBtns.forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  document.querySelector(`.tab-bar-btn[data-tab="${tabId}"]`).classList.add('active');
  navTitle.textContent = tabTitles[tabId] || 'sketch2stl';

  // Resize 3D renderer when switching to preview
  if (tabId === 'previewPanel' && renderer) {
    requestAnimationFrame(() => resize3D());
  }
}

tabBtns.forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// "Edit Drawing" button on preview tab
document.getElementById('editDrawingBtn').addEventListener('click', () => {
  switchTab('drawPanel');
});

// ========== OpenCV.js Loading ==========
let cvReady = false;
function waitForOpenCV() {
  return new Promise((resolve) => {
    if (typeof cv !== 'undefined' && cv.Mat) {
      cvReady = true;
      resolve();
      return;
    }
    window._cvReady = () => {
      if (typeof cv !== 'undefined' && typeof cv.then === 'function') {
        cv.then((readyCv) => {
          window.cv = readyCv;
          cvReady = true;
          resolve();
        });
      } else if (typeof cv !== 'undefined') {
        const check = () => {
          if (cv.Mat) { cvReady = true; resolve(); }
          else setTimeout(check, 50);
        };
        check();
      }
    };
    if (typeof cv !== 'undefined') {
      window._cvReady();
    }
  });
}

const cvPromise = waitForOpenCV();
cvPromise.then(() => {
  document.getElementById('convertBtn').disabled = false;
  document.getElementById('convertBtn').textContent = 'Convert to STL';
});

// ========== Drawing Canvas ==========
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');

let drawing = false;
let tool = 'brush';
let activeColor = '#000000';
const undoStack = [];
const MAX_UNDO = 20;

const PALETTE = [
  { name: 'Black',  hex: '#000000' },
  { name: 'Red',    hex: '#E94560' },
  { name: 'Blue',   hex: '#3498DB' },
  { name: 'Green',  hex: '#2ECC71' },
  { name: 'Orange', hex: '#F39C12' },
];

function clearCanvas() {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}
clearCanvas();
pushUndo();

function pushUndo() {
  if (undoStack.length >= MAX_UNDO) undoStack.shift();
  undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
}

function popUndo() {
  if (undoStack.length <= 1) return;
  undoStack.pop();
  const prev = undoStack[undoStack.length - 1];
  ctx.putImageData(prev, 0, 0);
}

// --- Pointer helpers (mouse + touch) ---
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  let clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY,
  };
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  const pos = getPos(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function moveDraw(e) {
  if (!drawing) return;
  e.preventDefault();
  const pos = getPos(e);
  const size = parseInt(document.getElementById('brushSize').value, 10);
  ctx.lineWidth = size;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : activeColor;
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function endDraw(e) {
  if (!drawing) return;
  drawing = false;
  ctx.beginPath();
  pushUndo();
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', moveDraw, { passive: false });
canvas.addEventListener('touchend', endDraw);
canvas.addEventListener('touchcancel', endDraw);

// --- Segmented Control (Brush / Eraser) ---
const brushBtn = document.getElementById('brushBtn');
const eraserBtn = document.getElementById('eraserBtn');

brushBtn.addEventListener('click', () => {
  tool = 'brush';
  brushBtn.classList.add('active');
  eraserBtn.classList.remove('active');
  canvas.style.cursor = 'crosshair';
});
eraserBtn.addEventListener('click', () => {
  tool = 'eraser';
  eraserBtn.classList.add('active');
  brushBtn.classList.remove('active');
  canvas.style.cursor = 'cell';
});

// --- Color Palette ---
const paletteItems = document.querySelectorAll('.palette-item');
paletteItems.forEach(item => {
  item.addEventListener('click', () => {
    activeColor = item.dataset.color;
    paletteItems.forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    tool = 'brush';
    brushBtn.classList.add('active');
    eraserBtn.classList.remove('active');
    canvas.style.cursor = 'crosshair';
  });
});

// --- Brush Size ---
const brushSizeInput = document.getElementById('brushSize');
const brushSizeVal = document.getElementById('brushSizeVal');
brushSizeInput.addEventListener('input', () => {
  brushSizeVal.textContent = brushSizeInput.value;
});

// --- Canvas Actions ---
document.getElementById('clearBtn').addEventListener('click', () => {
  clearCanvas();
  pushUndo();
});
document.getElementById('undoBtn').addEventListener('click', popUndo);

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    popUndo();
  }
});

// --- Upload Image ---
document.getElementById('uploadInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      clearCanvas();
      const cw = canvas.width, ch = canvas.height;
      const iw = img.width, ih = img.height;
      const ratio = Math.min(cw / iw, ch / ih);
      const dw = iw * ratio, dh = ih * ratio;
      const dx = (cw - dw) / 2, dy = (ch - dh) / 2;
      ctx.drawImage(img, dx, dy, dw, dh);
      pushUndo();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// --- Slider value labels ---
const sliders = [
  ['baseThickness', 'valBase',   v => parseFloat(v).toFixed(1) + 'mm'],
  ['scale',         'valScale',  v => parseFloat(v).toFixed(2)],
  ['upsample',      'valUpsample', v => v],
  ['blurRadius',    'valBlur',   v => v],
  ['minArea',       'valArea',   v => v],
  ['baseMargin',    'valMargin', v => parseFloat(v).toFixed(1) + 'mm'],
];
for (const [id, labelId, fmt] of sliders) {
  const input = document.getElementById(id);
  const label = document.getElementById(labelId);
  input.addEventListener('input', () => { label.textContent = fmt(input.value); });
}

// --- Color height slider labels ---
const colorHeightIds = ['000000', 'E94560', '3498DB', '2ECC71', 'F39C12'];
for (const cid of colorHeightIds) {
  const input = document.getElementById('height_' + cid);
  const label = document.getElementById('valHeight_' + cid);
  input.addEventListener('input', () => {
    label.textContent = parseFloat(input.value).toFixed(1) + 'mm';
  });
}

// ========== Convert ==========
const convertBtn = document.getElementById('convertBtn');
const downloadBtn = document.getElementById('downloadBtn');
const statusMsg = document.getElementById('statusMsg');
const previewChip = document.getElementById('previewChip');
const previewEmpty = document.getElementById('previewEmpty');

let lastSTLBlob = null;

async function saveOrShareSTL(blob) {
  const file = new File([blob], 'sketch.stl', { type: 'application/octet-stream' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'sketch.stl' });
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'sketch.stl';
  a.click();
  URL.revokeObjectURL(url);
}

convertBtn.addEventListener('click', async () => {
  if (!cvReady) {
    statusMsg.textContent = 'OpenCV is still loading. Please wait...';
    statusMsg.className = 'warning';
    return;
  }

  convertBtn.disabled = true;
  statusMsg.textContent = 'Converting (on-device)...';
  statusMsg.className = '';
  downloadBtn.style.display = 'none';

  const colorHeights = {};
  for (const p of PALETTE) {
    const sliderId = 'height_' + p.hex.replace('#', '');
    colorHeights[p.hex] = parseFloat(document.getElementById(sliderId).value);
  }

  await new Promise(r => setTimeout(r, 50));

  try {
    const stlBuffer = convertCanvasToSTL(canvas, {
      colorHeights,
      baseThickness: parseFloat(document.getElementById('baseThickness').value),
      scale: parseFloat(document.getElementById('scale').value),
      upsample: parseInt(document.getElementById('upsample').value, 10),
      blurRadius: parseInt(document.getElementById('blurRadius').value, 10),
      minArea: parseFloat(document.getElementById('minArea').value),
      baseMargin: parseFloat(document.getElementById('baseMargin').value),
      invert: document.getElementById('invertCheck').checked,
    });

    const blob = new Blob([stlBuffer], { type: 'application/octet-stream' });
    lastSTLBlob = blob;

    downloadBtn.style.display = 'flex';
    downloadBtn.onclick = function() { saveOrShareSTL(blob); };

    statusMsg.textContent = 'Done! Switch to Preview tab to view.';
    statusMsg.className = '';

    // Show 3D Preview
    show3DPreview(blob);

    // Update preview tab state
    previewChip.classList.add('visible');
    previewEmpty.style.display = 'none';

  } catch (err) {
    if (err instanceof NotEnclosedError || err.name === 'NotEnclosedError') {
      statusMsg.textContent = err.message;
      statusMsg.className = 'warning';
    } else {
      statusMsg.textContent = err.message;
      statusMsg.className = 'error';
    }
  } finally {
    convertBtn.disabled = false;
  }
});

// ========== 3D Preview ==========
let scene, camera, renderer, controls, currentMesh;

function resize3D() {
  const container = document.getElementById('preview3d');
  if (!renderer || !container) return;
  const w = container.clientWidth;
  const h = container.clientHeight;
  if (w === 0 || h === 0) return;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

function init3D() {
  const container = document.getElementById('preview3d');

  if (renderer) {
    if (currentMesh) { scene.remove(currentMesh); currentMesh = null; }
    return;
  }

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1A1410);

  camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 10000);
  camera.position.set(0, -50, 80);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;

  const ambient = new THREE.AmbientLight(0x404040, 1.5);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(50, -50, 100);
  scene.add(dirLight);
  const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.6);
  dirLight2.position.set(-50, 50, 50);
  scene.add(dirLight2);

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', resize3D);
}

function show3DPreview(blob) {
  init3D();

  const loader = new STLLoader();
  const reader = new FileReader();
  reader.onload = (e) => {
    const geometry = loader.parse(e.target.result);
    geometry.computeVertexNormals();

    const material = new THREE.MeshPhongMaterial({
      color: 0xD4A574,
      specular: 0x444444,
      shininess: 40,
      flatShading: false,
    });

    if (currentMesh) scene.remove(currentMesh);
    currentMesh = new THREE.Mesh(geometry, material);
    scene.add(currentMesh);

    geometry.computeBoundingBox();
    const box = geometry.boundingBox;
    const center = new THREE.Vector3();
    box.getCenter(center);
    const size = new THREE.Vector3();
    box.getSize(size);

    currentMesh.position.sub(center);

    const maxDim = Math.max(size.x, size.y, size.z);
    const fov = camera.fov * (Math.PI / 180);
    const dist = maxDim / (2 * Math.tan(fov / 2)) * 1.5;

    camera.position.set(0, -dist * 0.5, dist);
    camera.lookAt(0, 0, 0);
    controls.target.set(0, 0, 0);
    controls.update();
  };
  reader.readAsArrayBuffer(blob);
}
